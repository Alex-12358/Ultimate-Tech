modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"

displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "botarium"
mandatory = true
versionRange = "2.3.4"
ordering = "NONE"
side = "BOTH"

# Fusion as a required dependency
[[dependencies."${mod_id}"]]
modId = "fusion"
mandatory = true
versionRange = "[1.2.5,)"
ordering = "NONE"
side = "CLIENT"

